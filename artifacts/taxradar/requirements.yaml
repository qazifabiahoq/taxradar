packages:
  "framer-motion": "For page transitions and scroll-triggered animations"
  "recharts": "For the audit risk score pie chart"
  "axios": "For API requests as requested"
  "lucide-react": "For UI icons"
  "clsx": "For class name merging"
  "tailwind-merge": "For class name merging"

images:
